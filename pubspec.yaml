name: smartquizai
description: "AI Quiz App with Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # HTTP Client
  dio: ^5.7.0

  # Dependency Injection
  get_it: ^7.7.0

  # Functional Programming
  dartz: ^0.10.1

  # UI & Utils
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  file_picker: ^8.0.5
  share_plus: ^12.0.2
  syncfusion_flutter_pdf: ^26.2.14
  archive: ^3.6.1
  xml: ^6.5.0

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.0.0
  google_sign_in: ^6.1.0
  cloud_firestore: ^5.0.0
  firebase_database: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

  # Code Generation
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B0F1A"
  adaptive_icon_foreground: "assets/images/logo.png"

